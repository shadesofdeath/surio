<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Yakında Hazır</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #1f2937, #000);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 520px;
      padding: 45px 30px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      color: #d1d5db;
      line-height: 1.6;
    }

    .tag {
      margin-top: 28px;
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: #ffffff;
      color: #111827;
      font-weight: bold;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 32px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Yakında Hazırız</h1>
    <p>
      Web sitemiz şu anda hazırlanıyor.  
      Çok yakında burada olacağız.
    </p>
    <div class="tag">Coming Soon</div>
  </div>
</body>
</html>
